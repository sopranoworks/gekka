gekka {
  cluster {
    failure-detector {
      # phi value above which a node is declared unreachable
      threshold = 10.0

      # sliding-window size for heartbeat inter-arrival history
      max-sample-size = 1000

      # lower bound on sigma to prevent phi explosions when
      # heartbeats are very regular or the window is small
      min-std-deviation = 500ms
    }

    split-brain-resolver {
      # options: "off", "static-quorum", "keep-oldest"
      active-strategy = off

      # minimum duration the unreachable set must remain non-empty
      # before the strategy is consulted
      stable-after = 20s

      static-quorum {
        # minimum reachable member count required to keep the partition
        size = 1
      }

      keep-oldest {
        # if non-empty, only members with this role are eligible for
        # the oldest-member election
        role = ""

        # when true, the oldest member downs itself if it is the only
        # reachable member on its side
        down-if-alone = true
      }
    }
  }
}
