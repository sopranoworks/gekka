# application.conf — Gekka monitoring example
#
# Starts a cluster node that exposes /healthz and /metrics on port 9090.
# Join a Pekko seed node at 127.0.0.1:2552 to see cluster metrics populate.

pekko {
  actor.provider = cluster

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      # 0 = let the OS assign a free port (suitable for non-seed nodes).
      port     = 0
    }
  }

  cluster {
    seed-nodes = []          # call node.Join() programmatically instead

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after    = 5s
    }
  }

  loglevel = WARNING
}
