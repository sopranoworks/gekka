# application.conf — Gekka basic example
#
# This node joins an existing Pekko/Gekka cluster whose seed is at
# 127.0.0.1:2552.  Adjust hostname and seed-nodes for your network.
#
# Transport options:
#   transport = tcp        — Artery TCP (default; interoperates with Pekko/Akka TCP nodes)
#   transport = tls-tcp    — Artery TLS (requires tls { certificate, private-key, ca-certificates })
#   transport = aeron-udp  — Native Aeron UDP (low-latency; interoperates with Akka 2.6.x aeron-udp nodes)
#
# To enable Aeron UDP, comment out the "transport = tcp" line below and
# uncomment "transport = aeron-udp".  Both the Go node and the seed node
# must use the same transport.  The port must be fixed (not 0) for aeron-udp.

pekko {
  actor.provider = cluster

  remote.artery {
    transport = tcp
    # transport = aeron-udp   # ← uncomment to use native Aeron UDP transport
    canonical {
      hostname = "127.0.0.1"
      # port = 0 lets the OS pick a free port.
      # Use a fixed value (e.g. 2553) if you need a stable address.
      # NOTE: aeron-udp requires a fixed port (port = 0 is not supported).
      port     = 0
    }
  }

  cluster {
    seed-nodes = ["pekko://ClusterSystem@127.0.0.1:2552"]

    # Split-Brain Resolver: the keep-oldest strategy automatically downs
    # unreachable nodes after `stable-after`.  Required when the cluster
    # has no dedicated Artery downing mechanism.
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after    = 10s
    }

    # Heartbeat tuning — gives nodes 15 s to recover before they are
    # considered unreachable.
    failure-detector {
      acceptable-heartbeat-pause = 15s
      heartbeat-interval         = 1s
    }

    min-nr-of-members = 1
  }

  loglevel = INFO
}
