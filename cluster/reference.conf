gekka {
  remote {
    # Protocol names accepted during Artery handshake.
    # Default includes both "pekko" and "akka" for backward compatibility.
    accept-protocol-names = ["pekko", "akka"]

    artery {
      advanced {
        # maximum size of an Artery frame payload in bytes
        # Pekko default: 256 KiB (262144 bytes)
        maximum-frame-size = 262144
      }

      bind {
        # When non-empty, the TCP listener binds to this address instead of
        # the canonical hostname. The canonical hostname is still advertised
        # to the cluster. Use for NAT/Docker environments where internal and
        # external addresses differ.
        hostname = ""

        # When non-zero, the TCP listener binds to this port instead of the
        # canonical port. The canonical port is still advertised to the cluster.
        port = ""
      }
    }
  }

  cluster {
    # application version advertised during join handshake (rolling updates)
    app-version = "0.0.0"

    # trigger coordinated shutdown when this node is marked Down
    run-coordinated-shutdown-when-down = on

    # delay after member removal before quarantining its UID
    quarantine-removed-node-after = 5s

    # minimum number of members that must join before the leader
    # promotes Joining members to Up status
    min-nr-of-members = 1

    # how often to retry the initial join when no Welcome is received
    retry-unsuccessful-join-after = 10s

    # duration between gossip rounds
    gossip-interval = 1s

    # how often leader actions (member promotion/removal) are evaluated;
    # when unset or 0, leader actions run on every gossip tick
    leader-actions-interval = 1s

    # initial delay before starting gossip and heartbeat loops
    periodic-tasks-initial-delay = 1s

    # maximum time to retry joining seed nodes before aborting;
    # "off" means retry forever (no timeout)
    shutdown-after-unsuccessful-join-seed-nodes = off

    # whether to log informational cluster messages (transitions, join, leave)
    log-info = on

    # whether to log verbose cluster messages (gossip details, heartbeat events)
    log-info-verbose = off

    # duration after which Joining members are promoted to WeaklyUp
    # without convergence; "off" disables WeaklyUp promotion
    allow-weakly-up-members = 7s

    # probability [0.0, 1.0] that gossip targets a node with a different
    # view of the cluster state (speeds convergence)
    gossip-different-view-probability = 0.8

    # cluster size above which gossip-different-view-probability is halved
    reduce-gossip-different-view-probability = 400

    # maximum acceptable age of incoming gossip; older gossip is discarded
    gossip-time-to-live = 2s

    # how long removed-member tombstones are retained before pruning
    prune-gossip-tombstones-after = 24h

    # how often the periodic reaper re-evaluates phi for all nodes
    # and publishes unreachable events (supplements gossip-tick checks)
    unreachable-nodes-reaper-interval = 1s

    # delay after a member is marked Down before transitioning to Removed;
    # gives the downed node time for coordinated shutdown.
    # "off" or 0 means immediate removal (legacy behavior).
    down-removal-margin = off

    # maximum time to wait for the first seed node to respond
    seed-node-timeout = 5s

    # configuration compatibility validation on join
    configuration-compatibility-check {
      # when "on", incoming InitJoin config is validated against the local
      # node's config; mismatches cause the join to be rejected
      enforce-on-join = on
    }

    failure-detector {
      # phi value above which a node is declared unreachable
      threshold = 8.0

      # sliding-window size for heartbeat inter-arrival history
      max-sample-size = 1000

      # lower bound on sigma to prevent phi explosions when
      # heartbeats are very regular or the window is small
      min-std-deviation = 500ms

      # how often heartbeat messages are sent to monitored nodes
      heartbeat-interval = 1s

      # duration of lost heartbeats acceptable before considering anomaly
      acceptable-heartbeat-pause = 3s

      # expected time between heartbeat request and response
      expected-response-after = 1s

      # maximum number of cluster members this node sends heartbeats to;
      # targets are selected deterministically via a sorted ring
      monitored-by-nr-of-members = 9
    }

    split-brain-resolver {
      # options: "off", "static-quorum", "keep-oldest"
      active-strategy = off

      # minimum duration the unreachable set must remain non-empty
      # before the strategy is consulted
      stable-after = 20s

      # safety net: if unreachable members persist after stable-after + this
      # duration without resolution, down ALL nodes to force a clean restart.
      # "on" = derived as max(3/4 * stable-after, 4s); "off" = disabled;
      # or an explicit duration (e.g. "15s").
      down-all-when-unstable = on

      static-quorum {
        # minimum reachable member count required to keep the partition
        size = 1
        # restrict quorum counting to members with this role; empty = all members
        role = ""
      }

      keep-oldest {
        # if non-empty, only members with this role are eligible for
        # the oldest-member election
        role = ""

        # when true, the oldest member downs itself if it is the only
        # reachable member on its side
        down-if-alone = true
      }
    }

    multi-data-center {
      # name of the data center this node belongs to; encoded as the "dc-<name>" role
      self-data-center = "default"

      # probability [0.0, 1.0] that a gossip round targets a foreign-DC node;
      # intra-DC gossip always proceeds
      cross-data-center-gossip-probability = 0.1

      # maximum number of distinct foreign-DC nodes used as gossip targets
      cross-data-center-connections = 5
    }

    pub-sub {
      # actor name for the mediator
      name = "distributedPubSubMediator"

      # restrict pub-sub to nodes with this role; empty = all nodes
      role = ""

      # routing strategy for Send (point-to-point): "random" or "round-robin"
      routing-logic = "random"

      # interval between gossip rounds that propagate subscription
      # state across cluster nodes
      gossip-interval = 1s

      # how long tombstones for removed subscriptions are retained
      removed-time-to-live = 120s

      # maximum entries in a single delta message; when exceeded,
      # a full state sync is sent instead
      max-delta-elements = 3000

      # publish a DeadLetter event when no subscribers are found
      send-to-dead-letters-when-no-subscribers = on
    }

    # Per-role minimum member counts.
    # When set, both the global min-nr-of-members AND each per-role
    # minimum must be satisfied before the leader promotes Joining
    # members to Up.
    #
    # Example:
    #   role {
    #     backend.min-nr-of-members = 2
    #     frontend.min-nr-of-members = 1
    #   }
    # role {}

    singleton {
      # restrict singleton hosting to nodes with this role; empty means any node
      role = ""

      # how often the manager retries handover coordination during leadership transfer
      hand-over-retry-interval = 1s

      # name of the child actor spawned by the manager
      singleton-name = "singleton"

      # minimum number of hand-over retries before the manager gives up
      min-number-of-hand-over-retries = 15
    }

    singleton-proxy {
      # how often the proxy re-resolves the oldest node
      singleton-identification-interval = 1s

      # maximum messages buffered when singleton location is unknown
      buffer-size = 1000

      # name of the singleton child actor appended to manager path
      singleton-name = "singleton"

      # restrict which nodes the proxy considers; empty means any node
      role = ""
    }

    sharding {
      # total number of shards distributed across the cluster (immutable after start)
      number-of-shards = 1000

      # restrict shard allocation to members with this role; empty means any node
      role = ""

      # actor name for the sharding guardian
      guardian-name = "sharding"

      # backend for remember-entities: "eventsourced" or "ddata"
      remember-entities-store = "ddata"

      passivation {
        # "default-idle-strategy" or "custom-lru-strategy"
        strategy = "default-idle-strategy"

        default-idle-strategy {
          idle-entity {
            # duration after which an idle entity is passivated
            timeout = 120s
          }
        }

        custom-lru-strategy {
          # max active entities before LRU eviction kicks in
          active-entity-limit = 100000
        }
      }

      allocation-strategy {
        # options: "least-shard", "external", "dsl"
        type = "least-shard"

        external {
          url = ""
          timeout = 5s
        }

        dsl {
          # Simple script evaluation against Member objects
          rule = ""
        }
      }

      adaptive-rebalancing {
        # blend factor [0.0, 1.0] between load and shard-count
        load-weight = 0.5

        # weights for different metrics (normalized during initialization)
        cpu-weight = 0.4
        memory-weight = 0.3
        mailbox-weight = 0.3

        # minimum score spread that triggers rebalance
        rebalance-threshold = 0.2

        # maximum shards that can be rebalanced simultaneously
        max-simultaneous-rebalance = 3
      }
    }

    distributed-data {
      # actor name used for the replicator and its receptionist service key
      name = "ddataReplicator"

      # restrict replicator participation to members with this role; empty = all
      role = ""

      # duration between gossip rounds
      gossip-interval = 2s

      # cadence at which accumulated subscriber changes are flushed;
      # 0 means fire immediately (no batching)
      notify-subscribers-interval = 500ms

      # cap on total delta entries emitted per gossip round;
      # exceeding this falls back to full-state gossip for remaining CRDTs
      max-delta-elements = 500

      delta-crdt {
        # when off, every round sends full state for delta-aware CRDTs
        enabled = on

        # per-CRDT cap on operations in a single delta message;
        # exceeding this falls back to full-state gossip for that CRDT
        max-delta-size = 50
      }

      # when on, peer-ordered gossip targets the oldest members first
      prefer-oldest = off

      # cadence at which the pruning manager advances removed-node state
      pruning-interval = 120s

      # window allowed for pruning state to disseminate before the
      # tombstone is collected
      max-pruning-dissemination = 300s
    }
  }
}
