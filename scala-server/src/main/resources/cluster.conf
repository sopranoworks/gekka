pekko {
  # Test infrastructure: integration tests intentionally produce conditions
  # that Pekko reasonably logs as WARN (peer abruptly closed connection,
  # node marked UNREACHABLE after gekka shuts down, "other node quarantined
  # this node" when test partner reincarnates, etc.).  Those WARNs are
  # diagnostic for production but pure noise for a test gate that uses log
  # scrutiny to detect regressions in gekka-side behaviour.  Errors still
  # surface for genuine Pekko-side failures (failed serialization, etc.).
  loglevel = "ERROR"
  actor {
    provider = cluster
    debug {
      receive = off
    }
  }
  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      port = 2552
    }
  }
  cluster {
    seed-nodes = ["pekko://ClusterSystem@127.0.0.1:2552"]
    min-nr-of-members = 1
    # Integration tests spin many independent ClusterSystem instances inside the
    # same JVM; without this flag Pekko logs WARN on every secondary registration
    # of the cluster:type=Cluster MBean.
    jmx.multi-mbeans-in-same-jvm = on
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after = 5s
    }
    configuration-compatibility-check {
      enforce-on-join = off
    }
    failure-detector {
      acceptable-heartbeat-pause = 15s
      heartbeat-interval = 1s
    }
  }
}
