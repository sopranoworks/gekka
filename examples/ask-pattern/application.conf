# application.conf — Gekka ask-pattern example
#
# Connects to a Pekko RemoteSystem at 127.0.0.1:2552.
# The remote system hosts a /user/echo actor that replies to every message.

pekko {
  actor.provider = remote

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      # 0 = let the OS assign a free port (suitable for non-seed nodes).
      port     = 0
    }
  }

  loglevel = WARNING
}
