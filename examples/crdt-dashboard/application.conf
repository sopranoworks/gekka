# application.conf — Gekka crdt-dashboard example
#
# This node joins a cluster with a Pekko seed at 127.0.0.1:2552.
# The seed must run a GoReplicator actor at /user/goReplicator that
# speaks the Gekka JSON gossip protocol (see README.md).
#
# To run multiple Go dashboard instances at once, just launch additional
# `go run .` processes — each gets a unique OS-assigned port.  They all
# gossip through the Scala hub and see each other's CRDT contributions.

pekko {
  actor.provider = cluster

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      # 0 = OS-assigned port.  Read the actual value with node.Port() after Spawn.
      port     = 0
    }
  }

  cluster {
    seed-nodes = ["pekko://ClusterSystem@127.0.0.1:2552"]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after    = 10s
    }

    failure-detector {
      acceptable-heartbeat-pause = 15s
      heartbeat-interval         = 1s
    }

    min-nr-of-members = 1
  }

  loglevel = WARNING  # suppress Pekko INFO noise; dashboard owns stdout
}
