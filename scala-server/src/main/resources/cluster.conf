pekko {
  loglevel = "INFO"
  actor {
    provider = cluster
    serialization-bindings {
      "com.example.ClusterMessage" = jackson-json
    }
    debug {
      receive = off
    }
  }
  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      port = 2552
    }
  }
  cluster {
    seed-nodes = ["pekko://ClusterSystem@127.0.0.1:2552"]
    min-nr-of-members = 1
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      # 30s stable-after prevents Scala's SBR from prematurely downing its
      # local Scala peer when JVM contention from concurrent integration
      # test processes causes brief heartbeat gaps. This is independent of
      # the Go-side SBR window which is configured per-test.
      stable-after = 30s
    }
    configuration-compatibility-check {
      enforce-on-join = off
    }
    failure-detector {
      acceptable-heartbeat-pause = 15s
      heartbeat-interval = 1s
    }
  }
}
