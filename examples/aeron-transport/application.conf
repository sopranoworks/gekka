# application.conf — Gekka aeron-transport example
#
# This configuration enables the native Aeron UDP transport so that the Go
# node can join a hybrid cluster alongside Akka 2.6.x or Pekko 1.x nodes
# that are also configured with "transport = aeron-udp".
#
# Requirements
# ────────────
# • Both the Go node and the seed node MUST use the same transport.
# • A fixed canonical port is required for aeron-udp (port = 0 is not supported).
# • The Akka/Pekko seed node needs:
#     akka.remote.artery { transport = aeron-udp; canonical.hostname = "127.0.0.1"; canonical.port = 2551 }
#     akka.cluster.seed-nodes = ["akka://AeronSystem@127.0.0.1:2551"]
#
# Run
# ───
# 1. Start the Akka seed node (e.g. via sbt in test/compatibility/akka-multi-node).
# 2. Build the example:  go build -o bin/aeron-transport-demo ./examples/aeron-transport
# 3. Run:               ./bin/aeron-transport-demo

pekko {
  actor.provider = cluster

  remote.artery {
    # Use native Aeron UDP transport.
    # Comment this out and set "tcp" to fall back to Artery TCP.
    transport = aeron-udp

    canonical {
      hostname = "127.0.0.1"
      # Fixed port required for aeron-udp.
      # Choose a port that does not conflict with the seed node (2551).
      port     = 2553
    }
  }

  cluster {
    # Point at the Akka/Pekko seed node running aeron-udp on port 2551.
    # Use the "akka://" scheme when the seed is an Akka 2.6.x node.
    seed-nodes = ["akka://AeronSystem@127.0.0.1:2551"]

    # Split-Brain Resolver: required for well-behaved hybrid clusters.
    # "keep-oldest" retains the partition containing the oldest member.
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after    = 5s
    }

    # Give nodes plenty of time to reconnect before marking them Unreachable.
    failure-detector {
      acceptable-heartbeat-pause = 20s
      heartbeat-interval         = 1s
    }

    min-nr-of-members = 1
  }

  loglevel = INFO
}

# Gekka management API — optional; exposes /cluster/members and /health/* endpoints.
gekka.management.http {
  hostname = "127.0.0.1"
  port     = 8553
}
