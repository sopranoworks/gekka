# Gekka reference configuration.
# These are the built-in defaults for all pluggable provider plugins.
# Values defined here are the lowest-priority fallbacks; any key present in a
# user-supplied HOCON file takes precedence over the corresponding entry below.
#
# Override in your application config:
#
#   gekka {
#     persistence {
#       journal.plugin        = "postgres"
#       snapshot-store.plugin = "postgres"
#     }
#     telemetry {
#       provider.plugin = "otel"
#     }
#   }
pekko {
  actor {
    default-resizer {
      enabled = off
      lower-bound = 1
      upper-bound = 10
      pressure-threshold = 1
      rampup-rate = 0.2
      backoff-rate = 0.3
      backoff-threshold = 0.3
      messages-per-resize = 10
    }
  }
  dispatchers {
    default-dispatcher {
      type = "default-dispatcher"
      throughput = 5
    }
    pinned-dispatcher {
      type = "pinned-dispatcher"
      throughput = 1
    }
  }
}

gekka {
  persistence {
    journal.plugin        = "in-memory"
    snapshot-store.plugin = "in-memory"
    durable-state-store.plugin = "in-memory"
  }
  telemetry {
    provider.plugin = "no-op"
  }
  management {
    debug {
      # Enable the /cluster/debug/* introspection endpoints (read-only).
      # Default: false — debug endpoints return 404 unless explicitly enabled.
      enabled = false
    }
  }
  remote {
    artery {
      advanced {
        flight-recorder {
          enabled = true
          level = "lifecycle"
        }
      }
    }
  }
}

# Artery advanced knobs (Pekko-compatible). Values mirror Pekko's defaults and
# are threaded into the NodeManager as fallbacks when user config leaves them
# unset. See pekko.remote.artery.advanced.* in docs/CONFIG_PATH.md.
pekko {
  remote {
    artery {
      advanced {
        inbound-lanes = 4
        outbound-lanes = 1
        outbound-message-queue-size = 3072
        system-message-buffer-size = 20000
        outbound-control-queue-size = 20000
        handshake-timeout = 20s
        handshake-retry-interval = 1s
        system-message-resend-interval = 1s
        give-up-system-message-after = 6h
        stop-idle-outbound-after = 5m
        quarantine-idle-outbound-after = 6h
        stop-quarantined-after-idle = 3s
        remove-quarantined-association-after = 1h
        shutdown-flush-timeout = 1s
        death-watch-notification-flush-timeout = 3s
        inbound-restart-timeout = 5s
        inbound-max-restarts = 5
        outbound-restart-backoff = 1s
        outbound-restart-timeout = 5s
        outbound-max-restarts = 5
        buffer-pool-size = 128
        maximum-large-frame-size = "2 MiB"
        large-buffer-pool-size = 32
        outbound-large-message-queue-size = 256
        compression {
          actor-refs {
            max = 256
            advertisement-interval = 1m
          }
          manifests {
            max = 256
            advertisement-interval = 1m
          }
        }
        tcp {
          connection-timeout = 5s
          outbound-client-hostname = ""
        }
      }
    }
  }
}

# Cluster core small features (Pekko-compatible). Round-2 session 11 wires
# pekko.cluster.publish-stats-interval; "off" disables periodic stats events.
pekko {
  cluster {
    publish-stats-interval = off
  }
}

# Multi-data-center failure detector (Pekko-compatible). Round-2 session 12
# wires the cross-DC heartbeat / pause / response-after — only consulted for
# nodes whose data-center role differs from this node's self-data-center.
pekko {
  cluster {
    multi-data-center {
      failure-detector {
        heartbeat-interval = 3s
        acceptable-heartbeat-pause = 10s
        expected-response-after = 1s
      }
    }
  }
}

# Cluster sharding (Pekko-compatible). Mirrors Pekko reference.conf defaults
# for the sharding-specific knobs gekka exposes; user config overrides these.
pekko {
  cluster {
    sharding {
      rebalance-interval = 10s
      # Round-2 session 13 — retry/backoff (part 1).
      retry-interval              = 2s
      buffer-size                 = 100000
      shard-start-timeout         = 10s
      shard-failure-backoff       = 10s
      entity-restart-backoff      = 10s
      coordinator-failure-backoff = 5s
      # Round-2 session 14 — retry/backoff (part 2).
      waiting-for-state-timeout   = 2s
      updating-state-timeout      = 5s
      shard-region-query-timeout  = 3s
      entity-recovery-strategy    = "all"
      entity-recovery-constant-rate-strategy {
        frequency          = 100ms
        number-of-entities = 5
      }
      coordinator-state {
        write-majority-plus = 3
        read-majority-plus  = 5
      }
      # Round-2 session 15 — sharding miscellaneous.
      verbose-debug-logging                   = off
      fail-on-invalid-entity-state-transition = off
      healthcheck {
        names   = []
        timeout = 5s
      }
      passivation.default-idle-strategy.idle-entity.interval = "default"
      least-shard-allocation-strategy {
        rebalance-threshold = 1
        max-simultaneous-rebalance = 3
      }
      distributed-data {
        majority-min-cap = 5
        max-delta-elements = 5
        prefer-oldest = on
        durable.keys = ["shard-*"]
      }
      coordinator-singleton {
        role = ""
        singleton-name = "singleton"
        hand-over-retry-interval = 1s
        min-number-of-hand-over-retries = 15
      }
      coordinator-singleton-role-override = on

      # Round-2 session 20 — Coordination Lease for Sharding.  When non-empty,
      # use-lease names a LeaseProvider registered in the cluster's
      # LeaseManager; every Shard acquires a distributed lease before becoming
      # active and releases it on handoff.  lease-retry-interval is the
      # backoff between retries when Acquire returns false.
      use-lease = ""
      lease-retry-interval = 5s
    }
  }
}

# Cluster Singleton (Pekko-compatible).  Mirrors Pekko reference.conf defaults
# for pekko.cluster.singleton.*.  Round-2 session 20 adds use-lease and
# lease-retry-interval; the earlier role / singleton-name / hand-over knobs are
# parsed by gekka.LoadConfig directly into ClusterConfig.Singleton.
pekko {
  cluster {
    singleton {
      # When non-empty, names a LeaseProvider registered in the cluster's
      # LeaseManager.  The singleton manager acquires the lease before
      # spawning the singleton actor and releases it on handoff/stop.
      use-lease = ""
      # Backoff between lease-acquisition retries when Acquire returns false.
      lease-retry-interval = 5s
    }
  }
}

# Cluster Client (Pekko-compatible). Mirrors Pekko reference.conf defaults
# for pekko.cluster.client.* — values are loaded into ClusterConfig.ClusterClient
# by gekka.LoadConfig.  See cluster/client/reference.conf for the receptionist
# block (loaded separately when the cluster-tools jar's defaults are layered in).
pekko {
  cluster {
    client {
      initial-contacts = []
      establishing-get-contacts-interval = 3s
      refresh-contacts-interval = 60s
      heartbeat-interval = 2s
      acceptable-heartbeat-pause = 13s
      buffer-size = 1000
      reconnect-timeout = off

      receptionist {
        # Idle timeout applied to forwarded Send/SendToAll deliveries.
        response-tunnel-receive-timeout = 30s
        # Cadence of the receptionist's stale-client failure-detection sweep.
        failure-detection-interval = 2s
      }
    }

    # Distributed Data — small features round-2 session 16.  The earlier
    # gossip / delta-crdt / pruning / prefer-oldest knobs are overlaid from
    # gekka.cluster.distributed-data; this block defines the four new
    # session-16 entries.  Defaults match Pekko reference.conf.
    distributed-data {
      pruning-marker-time-to-live   = 6h
      log-data-size-exceeding       = "10 KiB"
      recovery-timeout              = 10s
      serializer-cache-time-to-live = 10s
      # Round-2 session 23 — durable storage.  Pekko activates the durable
      # path automatically when `keys` is non-empty; gekka also accepts an
      # explicit `enabled = on` so empty-keys configs can still smoke-test
      # the bbolt backend.  `lmdb.*` keys are mirrored under bbolt:
      #   dir                 → BoltDurableStoreOptions.Dir
      #   map-size            → BoltDurableStoreOptions.MapSize
      #   write-behind-interval → BoltDurableStoreOptions.WriteBehindInterval
      durable {
        enabled                     = off
        keys                        = []
        pruning-marker-time-to-live = 10d
        lmdb {
          dir                   = "ddata"
          map-size              = "100 MiB"
          write-behind-interval = off
        }
      }
    }
  }
}

# Coordination Lease — Round-2 session 18.  Mirrors Pekko's
# pekko-coordination defaults.  cluster/lease ships the in-memory reference
# provider under the implementation name "memory"; sessions 19/20 wire SBR
# lease-majority and Singleton/Sharding use-lease against these defaults.
pekko {
  coordination {
    lease {
      lease-class             = ""
      heartbeat-timeout       = 120s
      heartbeat-interval      = 12s
      lease-operation-timeout = 5s
    }
  }
}

# Split Brain Resolver — Round-2 session 19.  lease-majority strategy wires
# the coordination-lease registry shipped in cluster/lease.  When
# active-strategy = "lease-majority" the gekka top-level wiring defaults
# lease-implementation to "memory" (the in-memory reference provider) and
# fills LeaseSettings from the pekko.coordination.lease.* defaults above.
pekko {
  cluster {
    split-brain-resolver {
      lease-majority {
        # Registered LeaseProvider name (e.g. "memory" for the reference
        # provider; "kubernetes-lease" for a Kubernetes-leases extension).
        # Empty defers to the gekka default ("memory") when active-strategy
        # is lease-majority.  Mirrors Pekko's
        # split-brain-resolver.lease-majority.lease-implementation, which
        # accepts an FQCN; gekka uses provider names registered in the
        # LeaseManager.
        lease-implementation = ""

        # Time the minority side waits before attempting Acquire, giving the
        # majority partition first chance to win the lease.
        acquire-lease-delay-for-minority = 2s

        # Restrict majority/minority counting to members carrying this role.
        # Empty counts every member.  Overrides the cluster-wide SBR role
        # for lease-majority only.
        role = ""
      }
    }
  }
}
