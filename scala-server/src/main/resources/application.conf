pekko {
  loglevel = "WARNING"
  actor {
    # Pekko emits two WARNs when 'provider = remote' is used directly:
    #   - "Using the 'remote' ActorRefProvider directly, which is a
    #      low-level layer."
    #   - "Pekko Cluster not in use - Using Pekko Cluster is recommended
    #      if you need remote watch and deploy."
    # PekkoServer is the single-actor Echo target for TestIntegration_*
    # tests — gekka opens an Artery handshake and writes to /user/echo,
    # which works identically under provider=cluster (single-member
    # cluster, no seed required).
    provider = cluster
  }
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 2552
    }
    transport = tcp
  }
  cluster {
    # Self-seed: PekkoServer bootstraps as a 1-node cluster by joining
    # its own canonical address.  Without seed-nodes the cluster
    # subsystem WARNs "no seed-nodes configured" and the node stays in
    # Joining forever; with self-seed the node reaches Up almost
    # immediately.
    seed-nodes = ["pekko://RemoteSystem@127.0.0.1:2552"]
    # configuration-compatibility-check would fire when gekka opens an
    # Artery handshake without a matching cluster config — disable the
    # join-time check so the Artery-only Echo path is unaffected.
    configuration-compatibility-check.enforce-on-join = off
    # Minimal SBR config to silence the "no downing-provider-class"
    # WARN that Pekko emits when provider=cluster is configured without
    # a downing strategy.
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }
}
