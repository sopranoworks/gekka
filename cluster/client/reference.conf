# Cluster Client default settings — compatible with Apache Pekko cluster-tools.
# These defaults are loaded automatically; override in your application.conf.

pekko.cluster.client.receptionist {
  # Actor name registered under /system/.
  name = receptionist

  # Restrict receptionist deployment to nodes with this role. Empty = all nodes.
  role = ""

  # Number of contact-point paths returned in each Contacts reply.
  number-of-contacts = 3

  # How often the receptionist expects a heartbeat from each connected client.
  heartbeat-interval = 2s

  # Maximum gap between heartbeats before a client is considered stale.
  acceptable-heartbeat-pause = 13s
}

pekko.cluster.client {
  # Artery paths to initial ClusterReceptionist actors (mandatory — at least one).
  # Format: "pekko://SystemName@hostname:port/system/receptionist"
  # Example:
  #   initial-contacts = ["pekko://ClusterSystem@10.0.0.1:2552/system/receptionist"]
  initial-contacts = []

  # Retry interval when no contact point has been established yet.
  establishing-get-contacts-interval = 3s

  # Interval at which a connected client refreshes its contact-point list.
  refresh-contacts-interval = 60s

  # How often the client sends a liveness Heartbeat to the receptionist.
  heartbeat-interval = 2s

  # Maximum gap between HeartbeatRsp messages before the connection is
  # considered dead and a new contact is tried.
  acceptable-heartbeat-pause = 13s

  # Maximum number of messages buffered while the client is not connected.
  # Old messages are dropped when the buffer is full. 0 = no buffering.
  buffer-size = 1000

  # How long the client waits before giving up reconnection entirely.
  # Set to "off" (or leave at 0) to retry forever.
  reconnect-timeout = off
}
