# application.conf — Gekka ask-pattern example
#
# Connects to a Pekko RemoteSystem at 127.0.0.1:2552.
# The remote system hosts a /user/echo actor that replies to every message.
#
# Transport options:
#   transport = tcp        — Artery TCP (default)
#   transport = aeron-udp  — Native Aeron UDP (requires a fixed port; both sides must use aeron-udp)
#
# To enable Aeron UDP for this example:
#   1. Uncomment "transport = aeron-udp" below.
#   2. Set a fixed port (e.g. port = 2554).
#   3. Ensure the remote Pekko/Akka node is also configured with transport = aeron-udp.

pekko {
  actor.provider = remote

  remote.artery {
    transport = tcp
    # transport = aeron-udp   # ← uncomment to use native Aeron UDP transport
    canonical {
      hostname = "127.0.0.1"
      # 0 = let the OS assign a free port (suitable for tcp non-seed nodes).
      # NOTE: aeron-udp requires a fixed port — replace 0 with e.g. 2554.
      port     = 0
    }
  }

  loglevel = WARNING
}
