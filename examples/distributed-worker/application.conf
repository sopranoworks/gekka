# application.conf — Gekka distributed-worker example
#
# This worker node joins a 3-node local cluster:
#   • Scala seed-1  at 127.0.0.1:2552  (oldest — runs the ClusterSingleton)
#   • Scala seed-2  at 127.0.0.1:2553  (second seed; takes over singleton on failover)
#   • This Go node  at OS-assigned port (non-seed worker)
#
# Start the two Scala seeds first, then run:  go run .
# See README.md for full setup instructions.

pekko {
  actor.provider = cluster

  remote.artery {
    transport = tcp
    canonical {
      hostname = "127.0.0.1"
      # 0 = OS-assigned port.  Workers do not need a stable, advertised port.
      port     = 0
    }
  }

  cluster {
    seed-nodes = [
      "pekko://ClusterSystem@127.0.0.1:2552",
      "pekko://ClusterSystem@127.0.0.1:2553"
    ]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      # After 10 s of instability the SBR removes the unreachable node.
      # Lower this in dev to see failover faster; raise it in production.
      stable-after    = 10s
    }

    failure-detector {
      acceptable-heartbeat-pause = 15s
      heartbeat-interval         = 1s
    }

    min-nr-of-members = 1
  }

  loglevel = INFO
}
