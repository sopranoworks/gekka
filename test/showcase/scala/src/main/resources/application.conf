pekko {
  actor.provider = cluster
  actor.allow-java-serialization = off
  actor.warn-about-java-serializer-usage = on
  actor.serializers {
    jackson-cbor = "org.apache.pekko.serialization.jackson.JacksonCborSerializer"
  }
  actor.serialization-bindings {
    "com.gekka.showcase.ShowcaseMessage" = jackson-cbor
  }
  remote.artery {
    transport = tcp
    canonical.hostname = "127.0.0.1"
    canonical.port = ${showcase.port}
  }
  cluster {
    seed-nodes = ${?showcase.seeds-list}
    min-nr-of-members = 1
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-oldest
      stable-after    = 5s
    }
    configuration-compatibility-check.enforce-on-join = off
    failure-detector {
      acceptable-heartbeat-pause = 20s
      heartbeat-interval         = 1s
    }
    singleton-proxy {
      buffer-size = 1000
    }
    roles = ${?showcase.roles-list}
  }
  loglevel = INFO
  management.http.port = ${showcase.mgmt-port}
  # Bind explicitly to loopback: PekkoManagement's default hostname is
  # InetAddress.getLocalHost.getHostAddress, which may resolve to a LAN
  # address the runner (polling 127.0.0.1) can never reach.
  management.http.hostname = "127.0.0.1"
}
